<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com imagens</title>
</head>
<body>
    <h1>Testando carga e imagens</h1>
    <p>
        Abaixo você vai ver uma imagem que está na mesma pasta.
    </p>

    <img src="html.png" alt="Logo HTML5">

    <p>
        Podemos também carregar imagens que estão em sub-pastas.
    </p>
    <img src="imagens/css.png" alt="Logo CSS3">
    <p>
        Podemos também carregar imagens externas.
    </p>
    <img src="https://cdn.hackr.io/uploads/topics_svg/javascript.svg" alt="Logo JavaScript"> 
    <!-- Comentário: se o servidor que contém essa imagem cair, perde-se essa imagem. -->
    <p>
        fim da página
    </p>
</body>
</html>
