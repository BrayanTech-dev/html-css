<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/image-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/image-m.png" type="image/png">
        <img src="imagens/image-g.png" alt="Imagem flexível">
    </picture>
    <h1>Reproduzindo áudio</h1>
    <p>Vamos aprender a reproduzir áudio em HTML5</p>
    
    <audio preload="metadata" controls>
        <source src="media/2020 - Dyalla.mp3" type="audio/mpeg">
        <source src="media/2020 - Dyalla.ogg" type="audio/ogg">
        <source src="media/2020 - Dyalla.wav" type="audio/wav">
        <p>Infelizmente seu avegador não consegue reproduzir audio. <a href="media/2020 - Dyalla.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
    
</body>
</html>
